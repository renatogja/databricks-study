<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databricks Simulator - Auto-Load from Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0F3460;
            --secondary: #16213E;
            --accent: #00D4FF;
            --accent2: #FF006E;
            --text-light: #EAEAEA;
            --text-muted: #A8A8A8;
            --success: #2ECC71;
            --warning: #F39C12;
            --danger: #E74C3C;
        }

        html { scroll-behavior: smooth; }
        
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(15, 52, 96, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .lang-switcher {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 0.6rem 1rem;
            background: rgba(0, 212, 255, 0.1);
            color: var(--text-muted);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .lang-btn.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .content {
            flex: 1;
            padding: 3rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .quiz-section {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.8), rgba(22, 33, 62, 0.5));
            border: 2px solid var(--accent2);
            border-radius: 16px;
            padding: 3rem;
        }

        .quiz-title {
            font-size: 2em;
            color: var(--accent2);
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .quiz-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1em;
        }

        .loading {
            text-align: center;
            color: var(--accent);
            font-size: 1.2em;
            padding: 2rem;
        }

        .spinner {
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .question-card {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .question-number {
            color: var(--accent2);
            font-weight: 900;
            margin-bottom: 0.8rem;
        }

        .question-text {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.6;
        }

        .options {
            display: grid;
            gap: 0.8rem;
        }

        .option {
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .option:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent);
        }

        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            margin-top: 4px;
            flex-shrink: 0;
        }

        .option label {
            flex: 1;
            cursor: pointer;
            margin: 0;
        }

        .quiz-button {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }

        .quiz-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
        }

        .results-section {
            display: none;
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(22, 33, 62, 0.6));
            border: 3px solid var(--success);
            border-radius: 16px;
            padding: 3rem;
            margin-top: 3rem;
            text-align: center;
        }

        .results-section.show {
            display: block;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-display {
            font-size: 4em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
        }

        .score-text {
            font-size: 1.3em;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .score-status {
            font-size: 1.8em;
            font-weight: 900;
            margin: 1.5rem 0;
        }

        .score-status.pass {
            color: var(--success);
        }

        .score-status.fail {
            color: var(--danger);
        }

        .detailed-review {
            text-align: left;
            margin-top: 2rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .review-item {
            background: rgba(15, 52, 96, 0.6);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
        }

        .review-item.correct {
            border-left-color: var(--success);
            background: rgba(46, 204, 113, 0.1);
        }

        .review-item.incorrect {
            border-left-color: var(--danger);
            background: rgba(231, 76, 60, 0.1);
        }

        .review-question {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 0.95em;
        }

        .review-answer {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
        }

        .review-answer strong {
            color: var(--accent);
        }

        .answer-correct {
            color: var(--success);
        }

        .answer-incorrect {
            color: var(--danger);
        }

        .review-feedback {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(243, 156, 18, 0.1);
            border-left: 3px solid var(--warning);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 0.95em;
            line-height: 1.6;
        }

        .result-details {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-light);
        }

        .detail-value {
            color: var(--accent);
            font-weight: 900;
            font-size: 1.2em;
        }

        .reset-button {
            background: var(--accent);
            color: var(--primary);
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
            font-size: 1em;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.2);
            border-radius: 10px;
            margin: 2rem 0 1rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.3s ease;
        }

        .error-message {
            background: rgba(231, 76, 60, 0.1);
            border-left: 4px solid var(--danger);
            padding: 1.5rem;
            border-radius: 6px;
            color: var(--text-light);
        }

        @media (max-width: 768px) {
            .content { padding: 1.5rem; }
            .quiz-section { padding: 1.5rem; }
            .navbar { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">📊 Databricks Simulator</div>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="switchLanguage('pt')">🇧🇷 PT</button>
            <button class="lang-btn" onclick="switchLanguage('en')">🇺🇸 EN</button>
        </div>
    </div>

    <div class="content">
        <div id="quiz-section" class="quiz-section" style="display: none;">
            <h2 class="quiz-title" id="quiz-title">🎯 Simulador Databricks</h2>
            <p class="quiz-subtitle" id="quiz-subtitle">Questões carregadas do Google Sheets</p>
            <div class="progress-bar"><div class="progress-fill" style="width: 0%;" id="progress-bar"></div></div>
            <div id="quiz-container"></div>
            <button class="quiz-button" onclick="submitQuiz()" id="submit-btn">📊 Enviar Respostas</button>
        </div>

        <div id="loading-section" class="quiz-section">
            <div class="loading">
                <div class="spinner"></div>
                <p id="loading-text">Carregando questões da planilha...</p>
            </div>
        </div>

        <div id="results-section" class="results-section">
            <h3 style="font-size: 1.5em; color: var(--accent); margin-bottom: 1rem;" id="results-title">Seus Resultados</h3>
            <div class="score-display" id="score-display">0/20</div>
            <div class="score-text" id="score-percentage">0%</div>
            <div class="score-status" id="score-status">Tente Novamente</div>
            
            <div class="result-details">
                <div class="detail-item">
                    <span class="detail-label">✅ Acertos:</span>
                    <span class="detail-value" id="correct-count">0</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">❌ Erros:</span>
                    <span class="detail-value" id="wrong-count">0</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">📊 Taxa de Acerto:</span>
                    <span class="detail-value" id="percentage">0%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">🎯 Status:</span>
                    <span class="detail-value" id="final-status">Abaixo da meta</span>
                </div>
            </div>

            <h3 style="color: var(--accent); margin-top: 2rem; margin-bottom: 1rem;" id="review-title">📋 Revisão Detalhada</h3>
            <div class="detailed-review" id="detailed-review"></div>

            <button class="reset-button" onclick="resetQuiz()" id="reset-btn">🔄 Refazer Quiz</button>
        </div>
    </div>

    <script>
        const SHEET_ID = '1-QHlyDSk-gsqmhorV5hj-wNAauNXDCLYQHkoUe8O9to';
        const SHEET_GID_PT = '0';
        const SHEET_GID_EN = '1';

        let quizData = [];
        let userAnswers = [];
        let currentLanguage = 'pt';

        const texts = {
            pt: {
                loading: 'Carregando questões da planilha...',
                title: '🎯 Simulador Databricks',
                subtitle: 'Questões carregadas do Google Sheets - Meta: 70% para passar',
                submitBtn: '📊 Enviar Respostas',
                resultsTitle: 'Seus Resultados',
                reviewTitle: '📋 Revisão Detalhada',
                resetBtn: '🔄 Refazer Quiz',
                passed: '🎉 APROVADO!',
                failed: '📖 Tente Novamente',
                ready: '✅ Pronto para exame!',
                belowTarget: '❌ Abaixo da meta (70%)',
                question: 'Questão',
                correct: '✅ Acertos:',
                wrong: '❌ Erros:',
                accuracy: '📊 Taxa de Acerto:',
                status: '🎯 Status:',
                yourAnswer: 'Sua resposta:',
                correctAnswer: 'Resposta correta:',
                explanation: '💡 Explicação:'
            },
            en: {
                loading: 'Loading questions from spreadsheet...',
                title: '🎯 Databricks Simulator',
                subtitle: 'Questions loaded from Google Sheets - Target: 70% to pass',
                submitBtn: '📊 Submit Answers',
                resultsTitle: 'Your Results',
                reviewTitle: '📋 Detailed Review',
                resetBtn: '🔄 Retake Quiz',
                passed: '🎉 PASSED!',
                failed: '📖 Try Again',
                ready: '✅ Ready for exam!',
                belowTarget: '❌ Below target (70%)',
                question: 'Question',
                correct: '✅ Correct:',
                wrong: '❌ Wrong:',
                accuracy: '📊 Accuracy Rate:',
                status: '🎯 Status:',
                yourAnswer: 'Your answer:',
                correctAnswer: 'Correct answer:',
                explanation: '💡 Explanation:'
            }
        };

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const t = texts[lang];
            document.getElementById('quiz-title').textContent = t.title;
            document.getElementById('quiz-subtitle').textContent = t.subtitle;
            document.getElementById('submit-btn').textContent = t.submitBtn;
            document.getElementById('results-title').textContent = t.resultsTitle;
            document.getElementById('review-title').textContent = t.reviewTitle;
            document.getElementById('reset-btn').textContent = t.resetBtn;
            document.getElementById('loading-text').textContent = t.loading;
            
            loadQuestionsFromSheet(lang);
        }

        async function loadQuestionsFromSheet(lang = 'pt') {
            const gid = lang === 'pt' ? SHEET_GID_PT : SHEET_GID_EN;
            const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
            
            try {
                const response = await fetch(csvUrl);
                const csv = await response.text();
                
                const lines = csv.split('\n').filter(line => line.trim());
                quizData = [];

                for (let i = 1; i < lines.length; i++) {
                    const parts = parseCSVLine(lines[i]);
                    if (parts.length >= 7) {
                        quizData.push({
                            id: i,
                            question: parts[1],
                            optionA: parts[2],
                            optionB: parts[3],
                            optionC: parts[4],
                            correctAnswer: parseInt(parts[5]) - 1,
                            feedback: parts[6]
                        });
                    }
                }

                if (quizData.length === 0) {
                    throw new Error('Nenhuma questão encontrada');
                }

                document.getElementById('loading-section').style.display = 'none';
                document.getElementById('quiz-section').style.display = 'block';
                renderQuiz();
            } catch (error) {
                document.getElementById('loading-section').innerHTML = `
                    <div class="error-message">
                        <strong>❌ Erro ao carregar:</strong> ${error.message}<br>
                        <small>Verifique se a planilha está compartilhada publicamente.</small>
                    </div>
                `;
            }
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let insideQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"' && (i === 0 || line[i - 1] !== '\\')) {
                    insideQuotes = !insideQuotes;
                } else if (char === ',' && !insideQuotes) {
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            userAnswers = new Array(quizData.length).fill(-1);
            const t = texts[currentLanguage];

            quizData.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = 'question-card';
                const options = [
                    { text: q.optionA, id: 0 },
                    { text: q.optionB, id: 1 },
                    { text: q.optionC, id: 2 }
                ];

                div.innerHTML = `
                    <div class="question-number">${t.question} ${index + 1}/${quizData.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${options.map(opt => `
                            <label class="option">
                                <input type="radio" name="q${index}" value="${opt.id}" onchange="userAnswers[${index}] = ${opt.id}">
                                <label>${opt.text}</label>
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function submitQuiz() {
            const t = texts[currentLanguage];
            let correct = 0;
            quizData.forEach((q, i) => {
                if (userAnswers[i] === q.correctAnswer) {
                    correct++;
                }
            });

            const pct = Math.round((correct / quizData.length) * 100);
            const pass = pct >= 70;

            document.getElementById('score-display').textContent = `${correct}/${quizData.length}`;
            document.getElementById('score-percentage').textContent = `${pct}%`;
            document.getElementById('score-status').textContent = pass ? t.passed : t.failed;
            document.getElementById('score-status').classList.add(pass ? 'pass' : 'fail');
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('wrong-count').textContent = quizData.length - correct;
            document.getElementById('percentage').textContent = `${pct}%`;
            document.getElementById('final-status').textContent = pass ? t.ready : t.belowTarget;

            const reviewContainer = document.getElementById('detailed-review');
            reviewContainer.innerHTML = '';

            quizData.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.correctAnswer;
                const options = [q.optionA, q.optionB, q.optionC];
                const userAnswerText = userAnswers[i] >= 0 ? options[userAnswers[i]] : 'Não respondida';
                const correctAnswerText = options[q.correctAnswer];

                const reviewDiv = document.createElement('div');
                reviewDiv.className = `review-item ${isCorrect ? 'correct' : 'incorrect'}`;
                reviewDiv.innerHTML = `
                    <div class="review-question">Q${i + 1}: ${q.question}</div>
                    <div class="review-answer">
                        <strong>${t.yourAnswer}</strong><br>
                        <span class="${isCorrect ? 'answer-correct' : 'answer-incorrect'}">
                            ${userAnswerText}
                        </span>
                    </div>
                    ${!isCorrect ? `
                        <div class="review-answer">
                            <strong>${t.correctAnswer}</strong><br>
                            <span class="answer-correct">${correctAnswerText}</span>
                        </div>
                    ` : ''}
                    <div class="review-feedback">
                        <strong>${t.explanation}</strong><br>
                        ${q.feedback}
                    </div>
                `;
                reviewContainer.appendChild(reviewDiv);
            });

            document.getElementById('results-section').classList.add('show');
            window.scrollTo(0, document.getElementById('results-section').offsetTop - 100);
        }

        function resetQuiz() {
            document.getElementById('results-section').classList.remove('show');
            renderQuiz();
        }

        window.addEventListener('load', () => {
            loadQuestionsFromSheet('pt');
        });
    </script>
</body>
</html>
