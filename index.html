<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databricks - Conceitos + Simulador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0F3460;
            --secondary: #16213E;
            --accent: #00D4FF;
            --accent2: #FF006E;
            --text-light: #EAEAEA;
            --text-muted: #A8A8A8;
            --success: #2ECC71;
            --warning: #F39C12;
            --danger: #E74C3C;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            background: rgba(15, 52, 96, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 3px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.5em;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .lang-switcher { display: flex; gap: 0.5rem; }
        .lang-btn {
            padding: 0.6rem 1rem;
            background: rgba(0, 212, 255, 0.1);
            color: var(--text-muted);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .lang-btn.active {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }
        .main-wrapper { display: flex; flex: 1; }
        .sidebar {
            width: 280px;
            background: rgba(22, 33, 62, 0.8);
            border-right: 2px solid var(--accent);
            overflow-y: auto;
            padding: 2rem 0;
            position: sticky;
            top: 0;
            max-height: 100vh;
        }
        .sidebar-title {
            padding: 1rem 1.5rem;
            color: var(--accent);
            font-weight: 900;
            font-size: 0.9em;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            margin-bottom: 1rem;
        }
        .nav-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s ease;
            color: var(--text-muted);
            font-weight: 600;
        }
        .nav-item:hover {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
        }
        .nav-item.active {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent);
            border-left-color: var(--accent);
        }
        .nav-number {
            display: inline-block;
            background: var(--accent);
            color: var(--primary);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            text-align: center;
            line-height: 24px;
            margin-right: 0.5rem;
            font-size: 0.8em;
            font-weight: 900;
        }
        .nav-simulator {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(0, 212, 255, 0.1));
            border-top: 2px solid var(--accent2);
            margin-top: 2rem;
            padding-top: 1rem;
        }
        .content {
            flex: 1;
            padding: 3rem 2rem;
            overflow-y: auto;
            max-width: 1200px;
            margin: 0 auto;
        }
        .concept-section {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.8), rgba(22, 33, 62, 0.5));
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 3rem;
            margin-bottom: 4rem;
        }
        .concept-title {
            font-size: 2.2em;
            color: var(--accent);
            margin-bottom: 1rem;
            font-weight: 900;
        }
        .explanation-box {
            background: rgba(46, 204, 113, 0.08);
            border-left: 6px solid var(--success);
            padding: 1.5rem;
            margin: 1.5rem 0;
            border-radius: 10px;
            line-height: 1.8;
        }
        .quiz-section {
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.8), rgba(22, 33, 62, 0.5));
            border: 2px solid var(--accent2);
            border-radius: 16px;
            padding: 3rem;
        }
        .quiz-title {
            font-size: 2em;
            color: var(--accent2);
            margin-bottom: 0.5rem;
            font-weight: 900;
        }
        .quiz-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .question-card {
            background: rgba(15, 52, 96, 0.6);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        .question-number {
            color: var(--accent2);
            font-weight: 900;
            margin-bottom: 0.8rem;
        }
        .question-text {
            font-size: 1.1em;
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-weight: 600;
            line-height: 1.6;
        }
        .options { display: grid; gap: 0.8rem; }
        .option {
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }
        .option:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--accent);
        }
        .option input[type="radio"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            margin-top: 3px;
            flex-shrink: 0;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            margin: 0;
        }
        .quiz-button {
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }
        .quiz-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.3);
        }
        .results-section {
            display: none;
            background: linear-gradient(135deg, rgba(22, 33, 62, 0.9), rgba(22, 33, 62, 0.6));
            border: 3px solid var(--success);
            border-radius: 16px;
            padding: 3rem;
            margin-top: 3rem;
            text-align: center;
        }
        .results-section.show {
            display: block;
        }
        .score-display {
            font-size: 3em;
            font-weight: 900;
            color: var(--accent);
            margin: 1rem 0;
        }
        .score-status {
            font-size: 1.5em;
            font-weight: 900;
            margin: 1rem 0;
        }
        .score-status.pass { color: var(--success); }
        .score-status.fail { color: var(--danger); }
        .result-details {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            text-align: left;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }
        .detail-value {
            color: var(--accent);
            font-weight: 900;
        }
        .detailed-review {
            text-align: left;
            margin-top: 2rem;
            max-height: 500px;
            overflow-y: auto;
        }
        .review-item {
            background: rgba(15, 52, 96, 0.6);
            border-left: 4px solid var(--accent);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-radius: 8px;
        }
        .review-item.correct { border-left-color: var(--success); background: rgba(46, 204, 113, 0.1); }
        .review-item.incorrect { border-left-color: var(--danger); background: rgba(231, 76, 60, 0.1); }
        .review-question { font-weight: 700; color: var(--accent); margin-bottom: 0.5rem; }
        .review-answer { margin: 0.8rem 0; padding: 0.8rem; background: rgba(0, 0, 0, 0.3); border-radius: 6px; }
        .answer-correct { color: var(--success); }
        .answer-incorrect { color: var(--danger); }
        .review-feedback { margin-top: 0.8rem; padding: 0.8rem; background: rgba(243, 156, 18, 0.1); border-left: 3px solid var(--warning); border-radius: 6px; font-size: 0.9em; }
        .reset-button { background: var(--accent); color: var(--primary); padding: 0.8rem 2rem; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">📊 Databricks - Conceitos + Simulador</div>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('pt')">🇧🇷 PT</button>
            <button class="lang-btn" onclick="setLang('en')">🇺🇸 EN</button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="sidebar-title">📚 Conceitos</div>
            <div class="nav-item active" onclick="showConcept(1)"><span class="nav-number">1</span>SQL Order</div>
            <div class="nav-item" onclick="showConcept(2)"><span class="nav-number">2</span>CTE vs TEMP</div>
            <div class="nav-item" onclick="showConcept(3)"><span class="nav-number">3</span>ROLLUP vs CUBE</div>
            <div class="nav-item" onclick="showConcept(4)"><span class="nav-number">4</span>Liquid Cluster</div>
            <div class="nav-item" onclick="showConcept(5)"><span class="nav-number">5</span>Unity Catalog</div>
            <div class="nav-item" onclick="showConcept(6)"><span class="nav-number">6</span>LAG Function</div>
            <div class="nav-simulator">
                <div class="nav-item" onclick="loadQuiz()"><span style="font-size: 1.2em; margin-right: 0.5rem;">🎯</span>Simulador</div>
            </div>
        </div>
        <div class="content" id="content"></div>
    </div>

    <script>
        const SHEET_ID = '1-QHlyDSk-gsqmhorV5hj-wNAauNXDCLYQHkoUe8O9to';
        let allQuestions = { pt: [], en: [] };
        let currentLang = 'pt';
        let userAnswers = {};
        let quizLoaded = false;

        const concepts = {
            pt: [
                { id: 1, title: "1️⃣ SQL Execution Order", content: '<div class="explanation-box"><strong>Window functions NÃO podem estar em WHERE!</strong><br>SQL: FROM → WHERE → GROUP BY → SELECT → ORDER BY<br>Window functions = SELECT (passo 4)<br>WHERE = passo 2<br><strong>Solução:</strong> Use CTE antes!</div>' },
                { id: 2, title: "2️⃣ CTE vs TEMP TABLE", content: '<div class="explanation-box"><strong>CTE:</strong> Memória, sem disco<br><strong>TEMP TABLE:</strong> Disco, persiste<br><strong>Melhor para debugging:</strong> CTE!</div>' },
                { id: 3, title: "3️⃣ ROLLUP vs CUBE", content: '<div class="explanation-box"><strong>ROLLUP:</strong> Hierarquia ✅<br><strong>CUBE:</strong> Todas combinações ❌<br><strong>GROUPING SETS:</strong> Você escolhe ✅</div>' },
                { id: 4, title: "4️⃣ Liquid Clustering", content: '<div class="explanation-box"><strong>CLUSTER BY:</strong> Define estratégia<br><strong>OPTIMIZE:</strong> Aplica fisicamente<br>⚠️ Sem OPTIMIZE não funciona!</div>' },
                { id: 5, title: "5️⃣ Unity Catalog", content: '<div class="explanation-box">❌ "Schemas vazios invisíveis"<br>✅ INVISÍVEIS SEM USE SCHEMA privilege!<br>100 tabelas mas invisível!</div>' },
                { id: 6, title: "6️⃣ LAG Function", content: '<div class="explanation-box"><strong>LAG:</strong> Valor anterior<br><strong>Problema:</strong> Calcula TODOS gaps<br><strong>Solução:</strong> ROW_NUMBER() + JOIN</div>' }
            ],
            en: [
                { id: 1, title: "1️⃣ SQL Execution Order", content: '<div class="explanation-box"><strong>Window functions NOT in WHERE!</strong><br>SQL: FROM → WHERE → GROUP BY → SELECT → ORDER BY<br>Window functions = SELECT (step 4)<br>WHERE = step 2<br><strong>Solution:</strong> Use CTE first!</div>' },
                { id: 2, title: "2️⃣ CTE vs TEMP TABLE", content: '<div class="explanation-box"><strong>CTE:</strong> Memory, no disk<br><strong>TEMP TABLE:</strong> Disk, persists<br><strong>Best for debugging:</strong> CTE!</div>' },
                { id: 3, title: "3️⃣ ROLLUP vs CUBE", content: '<div class="explanation-box"><strong>ROLLUP:</strong> Hierarchy ✅<br><strong>CUBE:</strong> All combinations ❌<br><strong>GROUPING SETS:</strong> You choose ✅</div>' },
                { id: 4, title: "4️⃣ Liquid Clustering", content: '<div class="explanation-box"><strong>CLUSTER BY:</strong> Define strategy<br><strong>OPTIMIZE:</strong> Apply physically<br>⚠️ Without OPTIMIZE no work!</div>' },
                { id: 5, title: "5️⃣ Unity Catalog", content: '<div class="explanation-box">❌ "Empty schemas invisible"<br>✅ INVISIBLE WITHOUT USE SCHEMA privilege!<br>100 tables but invisible!</div>' },
                { id: 6, title: "6️⃣ LAG Function", content: '<div class="explanation-box"><strong>LAG:</strong> Previous value<br><strong>Problem:</strong> Calculates ALL gaps<br><strong>Solution:</strong> ROW_NUMBER() + JOIN</div>' }
            ]
        };

        async function loadAllQuestions() {
            const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
            try {
                const response = await fetch(csvUrl);
                const csv = await response.text();
                const lines = csv.split('\n').filter(l => l.trim());
                allQuestions.pt = [];
                allQuestions.en = [];
                for (let i = 1; i < lines.length; i++) {
                    const parts = parseCSV(lines[i]);
                    if (parts.length >= 7 && parts[1].trim()) {
                        const q = {
                            question: parts[1].trim(),
                            optionA: parts[2].trim(),
                            optionB: parts[3].trim(),
                            optionC: parts[4].trim(),
                            correctAnswer: parseInt(parts[5]) - 1,
                            feedback: parts[6].trim()
                        };
                        const isPT = !q.question.match(/^(A|What|Which|How|To get|A data|After|Qual)/i);
                        if (isPT) {
                            allQuestions.pt.push(q);
                        } else {
                            allQuestions.en.push(q);
                        }
                    }
                }
                console.log(`✅ PT: ${allQuestions.pt.length} | EN: ${allQuestions.en.length}`);
                quizLoaded = true;
            } catch (error) {
                console.error('❌ Erro:', error);
            }
        }

        function parseCSV(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim().replace(/^"|"$/g, ''));
                    current = '';
                    continue;
                }
                current += char;
            }
            result.push(current.trim().replace(/^"|"$/g, ''));
            return result;
        }

        function showConcept(n) {
            const c = concepts[currentLang][n - 1];
            document.getElementById('content').innerHTML = `<div class="concept-section"><h2 class="concept-title">${c.title}</h2>${c.content}</div>`;
        }

        async function loadQuiz() {
            if (!quizLoaded) {
                document.getElementById('content').innerHTML = `<div class="quiz-section"><h2 class="quiz-title">🎯 Simulador</h2><p class="quiz-subtitle"><div class="spinner"></div> Carregando questões...</p></div>`;
                await loadAllQuestions();
            }
            renderQuiz();
        }

        function renderQuiz() {
            const q = allQuestions[currentLang];
            if (q.length === 0) {
                document.getElementById('content').innerHTML = '<div style="color: var(--danger);">❌ Nenhuma questão encontrada</div>';
                return;
            }
            let html = `<div class="quiz-section"><h2 class="quiz-title">🎯 Simulador</h2>`;
            q.forEach((qu, i) => {
                html += `<div class="question-card">
                    <div class="question-number">Q${i+1}/${q.length}</div>
                    <div class="question-text">${qu.question}</div>
                    <div class="options">
                        <label class="option"><input type="radio" name="q${i}" value="0" onchange="userAnswers[${i}]=0;"><label>${qu.optionA}</label></label>
                        <label class="option"><input type="radio" name="q${i}" value="1" onchange="userAnswers[${i}]=1;"><label>${qu.optionB}</label></label>
                        <label class="option"><input type="radio" name="q${i}" value="2" onchange="userAnswers[${i}]=2;"><label>${qu.optionC}</label></label>
                    </div>
                </div>`;
            });
            html += `<button class="quiz-button" onclick="submitQuiz()">${currentLang === 'pt' ? 'Enviar Respostas' : 'Submit Answers'}</button><div id="results"></div></div>`;
            document.getElementById('content').innerHTML = html;
            userAnswers = {};
        }

        function submitQuiz() {
            const q = allQuestions[currentLang];
            let correct = 0;
            q.forEach((qu, i) => {
                if (userAnswers[i] === qu.correctAnswer) correct++;
            });
            const pct = Math.round((correct / q.length) * 100);
            const pass = pct >= 70;
            let html = `<div class="results-section show">
                <h3>${currentLang === 'pt' ? 'Seus Resultados' : 'Your Results'}</h3>
                <div class="score-display">${correct}/${q.length}</div>
                <div style="font-size: 1.3em; color: var(--text-muted); margin: 1rem 0;">${pct}%</div>
                <div class="score-status ${pass ? 'pass' : 'fail'}">${pass ? (currentLang === 'pt' ? '🎉 APROVADO!' : '🎉 PASSED!') : (currentLang === 'pt' ? '📖 Tente Novamente' : '📖 Try Again')}</div>
                <div class="result-details">
                    <div class="detail-item"><span>${currentLang === 'pt' ? 'Acertos' : 'Correct'}:</span><span class="detail-value">${correct}</span></div>
                    <div class="detail-item"><span>${currentLang === 'pt' ? 'Erros' : 'Wrong'}:</span><span class="detail-value">${q.length - correct}</span></div>
                </div>
                <h3 style="color: var(--accent); margin-top: 1.5rem;">${currentLang === 'pt' ? 'Revisão Detalhada' : 'Detailed Review'}</h3>
                <div class="detailed-review">`;
            q.forEach((qu, i) => {
                const isCorrect = userAnswers[i] === qu.correctAnswer;
                const opts = [qu.optionA, qu.optionB, qu.optionC];
                const userAns = userAnswers[i] !== undefined ? opts[userAnswers[i]] : (currentLang === 'pt' ? 'Não respondida' : 'Not answered');
                html += `<div class="review-item ${isCorrect ? 'correct' : 'incorrect'}">
                    <div class="review-question">Q${i+1}: ${qu.question}</div>
                    <div class="review-answer"><strong>${currentLang === 'pt' ? 'Sua resposta:' : 'Your answer:'}</strong><br><span class="${isCorrect ? 'answer-correct' : 'answer-incorrect'}">${userAns}</span></div>
                    ${!isCorrect ? `<div class="review-answer"><strong>${currentLang === 'pt' ? 'Correta:' : 'Correct:'}</strong><br><span class="answer-correct">${opts[qu.correctAnswer]}</span></div>` : ''}
                    <div class="review-feedback"><strong>💡</strong> ${qu.feedback}</div>
                </div>`;
            });
            html += `</div><button class="reset-button" onclick="loadQuiz()">${currentLang === 'pt' ? 'Refazer' : 'Retake'}</button></div>`;
            document.getElementById('results').innerHTML = html;
        }

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            showConcept(1);
        }

        window.addEventListener('load', async () => {
            await loadAllQuestions();
            showConcept(1);
        });
    </script>
</body>
</html>
